apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: global-prometheus-ingress
  namespace: monitoring

spec:
  ingressClassName: nginx
  rules:
  - host: prom.avvk.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: avvk-prom-grafana-kube-pro-prometheus
            port:
              number: 9090
